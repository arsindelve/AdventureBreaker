name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Smoke tests (stdlib only — no install)
        run: python -m unittest discover -s tests -v

      - name: CLI is importable and wired
        run: |
          python -m adventurebreaker.harness --help
          python -c "import adventurebreaker, adventurebreaker.harness; print('import ok', adventurebreaker.__version__)"

      - name: Validate committed JSON (spines + coverage ledger)
        run: |
          python - <<'PY'
          import json, glob, sys
          bad = []
          for f in glob.glob("adventurebreaker/spine/*.json") + glob.glob("coverage/*.json"):
              try:
                  json.load(open(f))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          for f in glob.glob("coverage/*.jsonl"):
              for i, line in enumerate(open(f), 1):
                  line = line.strip()
                  if line:
                      try:
                          json.loads(line)
                      except Exception as e:
                          bad.append(f"{f}:{i}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("all committed JSON/JSONL is valid")
          PY
